<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>A股大盘云图</title>
  <style>
    :root { --bg:#f5f7fb; --surface:#fff; --ink:#172033; --muted:#64748b; --line:#e5e7eb; --red:#dc2626; --green:#16a34a; --flat:#64748b; --brand:#1d4ed8; --shadow:0 10px 28px rgba(15,23,42,.08); --radius:18px; }
    *{box-sizing:border-box} html{-webkit-text-size-adjust:100%} body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.55}
    header{background:linear-gradient(135deg,#0f172a,#1d4ed8);color:#fff;padding:calc(22px + env(safe-area-inset-top)) clamp(16px,5vw,30px) 22px}.hero{max-width:1220px;margin:0 auto}h1{margin:0;font-size:clamp(28px,7vw,44px);line-height:1.08;letter-spacing:-.04em}.subtitle{margin-top:10px;color:rgba(255,255,255,.82);font-size:clamp(13px,3.4vw,16px)}
    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-top:18px}.tab{color:#dbeafe;text-decoration:none;border:1px solid rgba(255,255,255,.25);padding:9px 13px;border-radius:999px;font-weight:800;font-size:14px}.tab.active,.tab:hover{background:#fff;color:#1e3a8a}
    main{max-width:1220px;margin:0 auto;padding:clamp(12px,4vw,22px)}.card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:clamp(14px,4vw,18px);margin-bottom:16px}.section-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-end;margin-bottom:12px}h2{margin:0 0 4px;font-size:clamp(19px,4vw,24px)}.muted{color:var(--muted);font-size:13px}.toolbar{display:flex;gap:8px;flex-wrap:wrap}.switch{min-height:38px;border:1px solid var(--line);background:#f8fafc;color:#334155;border-radius:999px;padding:8px 13px;font-weight:900;cursor:pointer}.switch.active{background:#1d4ed8;color:#fff;border-color:#1d4ed8}
    .cloud{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));grid-auto-flow:dense;gap:10px}.tile{position:relative;min-height:112px;overflow:hidden;border:1px solid var(--line);border-radius:15px;background:#f8fafc;padding:12px}.tile::before{content:"";position:absolute;inset:0;background:var(--tile-color,#94a3b8);opacity:.16}.tile>*{position:relative;z-index:1}.tile.up{--tile-color:var(--red);border-color:rgba(220,38,38,.2)}.tile.down{--tile-color:var(--green);border-color:rgba(22,163,74,.2)}.tile.flat{--tile-color:var(--flat)}.name{font-weight:950;font-size:clamp(19px,4.8vw,26px);line-height:1.08;letter-spacing:-.03em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.code{margin-top:4px;font-weight:800;font-size:12px;color:#64748b;letter-spacing:.02em}.pct{font-size:clamp(22px,5vw,29px);font-weight:950;line-height:1;margin-top:10px}.up .pct{color:#991b1b}.down .pct{color:#166534}.meta{display:grid;gap:2px;margin-top:8px;font-size:12px;color:#475569}.legend{display:flex;gap:10px;flex-wrap:wrap}.dot{display:inline-block;width:9px;height:9px;border-radius:99px;margin-right:4px}.dot.red{background:var(--red)}.dot.green{background:var(--green)}.dot.gray{background:var(--flat)}
    .stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:16px}.stat{background:#fff;border-radius:16px;box-shadow:var(--shadow);padding:14px}.stat b{display:block;font-size:clamp(22px,6vw,30px);line-height:1.1}.footer-note{color:var(--muted);font-size:12px;margin-top:10px}
    @media(max-width:720px){.section-head{display:block}.toolbar{margin-top:10px}.stats{grid-template-columns:1fr 1fr}.cloud{grid-template-columns:1fr 1fr}.tile{min-height:104px;padding:10px}.tab{flex:1;text-align:center}.switch{flex:1}.name{font-size:20px}.code{font-size:12px}}
    @media(max-width:380px){.cloud,.stats{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header><div class="hero"><h1>A股大盘云图</h1><div class="subtitle">用指数、行业板块、概念板块涨跌幅快速观察市场温度。红色为上涨，绿色为下跌。</div><nav class="tabs"><a class="tab active" href="./">大盘云图</a><a class="tab" href="./national-team.html">国家队三因子</a></nav></div></header>
  <main>
    <section class="stats" aria-label="市场概览"><div class="stat"><span class="muted">交易日期</span><b id="trade-date">--</b></div><div class="stat"><span class="muted">指数上涨</span><b id="index-up">--</b></div><div class="stat"><span class="muted">行业上涨</span><b id="industry-up">--</b></div><div class="stat"><span class="muted">概念上涨</span><b id="concept-up">--</b></div></section>
    <section class="card"><div class="section-head"><div><h2>主要指数</h2><p class="muted">宽基指数涨跌幅与成交额概览。</p></div><div class="legend"><span><i class="dot red"></i>涨</span><span><i class="dot green"></i>跌</span><span><i class="dot gray"></i>平</span></div></div><div id="index-cloud" class="cloud">加载中...</div></section>
    <section class="card"><div class="section-head"><div><h2>板块云图</h2><p id="board-meta" class="muted">行业板块 / 概念板块可切换。</p></div><div class="toolbar"><button class="switch active" data-type="industry">行业板块</button><button class="switch" data-type="concept">概念板块</button></div></div><div id="board-cloud" class="cloud">加载中...</div><p class="footer-note">说明：指数、行业板块、概念板块使用东方财富实时行情生成；红色为上涨，绿色为下跌。</p></section>
  </main>
<script>
const CLOUD_URL = new URL('data/market-cloud.json', window.location.href).toString();
let cloudData = null; let activeType = 'industry';
const fmtPct=n=>Number.isFinite(Number(n))?`${Number(n).toFixed(2)}%`:'--';
const fmtAmount=n=>{const v=Number(n||0); if(!v)return'--'; if(v>=1e8)return`${(v/1e8).toFixed(1)}亿`; return`${(v/1e4).toFixed(0)}万`;};
function tile(n){const span=Math.max(1,Math.min(3,Math.round(Number(n.visual_size||1)/8))); return `<article class="tile ${n.direction||'flat'}" style="grid-column:span ${span}"><div class="name" title="${n.name||''}">${n.name||''}</div><div class="code">${n.code||''}</div><div class="pct">${fmtPct(n.pct_chg)}</div><div class="meta"><span>成交额 ${fmtAmount(n.amount)}</span><span>最新 ${Number.isFinite(Number(n.latest))?Number(n.latest).toFixed(2):'--'}</span></div></article>`;}
function countUp(arr){return (arr||[]).filter(x=>Number(x.pct_chg)>0.2).length;}
function render(){ if(!cloudData)return; document.getElementById('trade-date').textContent=cloudData.trade_date||'--'; document.getElementById('index-up').textContent=`${countUp(cloudData.indices)}/${(cloudData.indices||[]).length}`; document.getElementById('industry-up').textContent=`${countUp(cloudData.industry)}/${(cloudData.industry||[]).length}`; document.getElementById('concept-up').textContent=`${countUp(cloudData.concept)}/${(cloudData.concept||[]).length}`; document.getElementById('index-cloud').innerHTML=(cloudData.indices||[]).map(tile).join('')||'暂无指数数据'; const nodes=cloudData[activeType]||[]; document.getElementById('board-cloud').innerHTML=nodes.map(tile).join('')||'暂无板块数据'; document.getElementById('board-meta').textContent=`${activeType==='industry'?'行业板块':'概念板块'}：上涨 ${countUp(nodes)} / ${nodes.length}`; }
async function load(){try{const res=await fetch(CLOUD_URL,{cache:'no-store'}); if(!res.ok)throw new Error(res.status); cloudData=await res.json(); render();}catch(e){document.getElementById('index-cloud').textContent='云图数据加载失败';document.getElementById('board-cloud').textContent=e.message;}}
document.querySelectorAll('.switch').forEach(btn=>btn.onclick=()=>{activeType=btn.dataset.type;document.querySelectorAll('.switch').forEach(b=>b.classList.toggle('active',b===btn));render();});
load();
</script>
</body>
</html>
