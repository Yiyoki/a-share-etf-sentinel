<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>A股国家队 ETF 三因子 Sentinel</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --surface: #ffffff;
      --ink: #182033;
      --muted: #64748b;
      --line: #e5e7eb;
      --brand: #2563eb;
      --brand-dark: #172554;
      --shadow: 0 8px 24px rgba(15,23,42,.08);
      --radius: 16px;
    }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.55;
    }
    header {
      background: linear-gradient(135deg, var(--brand-dark), var(--brand));
      color: white;
      padding: calc(22px + env(safe-area-inset-top)) clamp(16px, 5vw, 28px) 24px;
    }
    .hero { max-width: 1180px; margin: 0 auto; }
    h1 { margin: 0; font-size: clamp(24px, 6vw, 36px); line-height: 1.15; letter-spacing: -.03em; }
    h2 { margin: 0 0 12px; font-size: clamp(18px, 4vw, 22px); }
    p { margin: 0 0 10px; }
    .subtitle { margin-top: 10px; color: rgba(255,255,255,.82); font-size: clamp(13px, 3.4vw, 16px); }
    main { max-width: 1180px; margin: 0 auto; padding: clamp(12px, 4vw, 20px); }
    .grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 16px; }
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: clamp(14px, 4vw, 18px);
      box-shadow: var(--shadow);
      min-width: 0;
    }
    .metric {
      font-size: clamp(28px, 9vw, 34px);
      line-height: 1.12;
      font-weight: 800;
      letter-spacing: -.03em;
      word-break: break-word;
    }
    .muted { color: var(--muted); font-size: 13px; }
    .section { margin-top: 16px; }
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 0 -2px; }
    table { border-collapse: collapse; width: 100%; font-size: 14px; min-width: 760px; }
    th, td { padding: 9px 10px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; }
    th { background: #f8fafc; color: #334155; white-space: nowrap; }
    td { overflow-wrap: anywhere; }
    .badge { display: inline-block; padding: 5px 11px; border-radius: 999px; font-weight: 800; font-size: .78em; white-space: nowrap; }
    .neutral { background:#e2e8f0; color:#334155; }
    .watch { background:#fef3c7; color:#92400e; }
    .strong_watch { background:#fee2e2; color:#991b1b; }
    button {
      min-height: 44px;
      border: 0;
      border-radius: 12px;
      background: var(--brand);
      color: white;
      padding: 10px 16px;
      cursor: pointer;
      font-weight: 800;
      font-size: 15px;
      touch-action: manipulation;
    }
    button:disabled { opacity: .6; }
    button:focus-visible { outline: 3px solid rgba(37,99,235,.3); outline-offset: 2px; }
    pre { white-space: pre-wrap; background:#0f172a; color:#dbeafe; padding:12px; border-radius:10px; max-height:240px; overflow:auto; }

    @media (max-width: 920px) {
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 640px) {
      header { padding-bottom: 20px; }
      main { padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
      .grid { grid-template-columns: 1fr 1fr; gap: 10px; }
      .grid .card:first-child { grid-column: 1 / -1; }
      .card { border-radius: 14px; }
      .section { margin-top: 12px; }
      #signal-meta { font-size: 13px; color: var(--muted); }
      #triggered.metric { font-size: clamp(22px, 7vw, 30px); }
      button { width: 100%; margin-top: 4px; }

      .responsive-table { min-width: 0; }
      .responsive-table thead { display: none; }
      .responsive-table,
      .responsive-table tbody,
      .responsive-table tr,
      .responsive-table td { display: block; width: 100%; }
      .responsive-table tr {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 8px 10px;
        margin-bottom: 10px;
        background: #fff;
      }
      .responsive-table td {
        display: grid;
        grid-template-columns: 92px minmax(0, 1fr);
        gap: 8px;
        border-bottom: 0;
        padding: 6px 0;
        font-size: 13px;
      }
      .responsive-table td::before {
        content: attr(data-label);
        color: var(--muted);
        font-weight: 700;
      }
      .responsive-table td[data-label="解释"],
      .responsive-table td[data-label="消息"] { grid-template-columns: 1fr; }
      .responsive-table td[data-label="解释"]::before,
      .responsive-table td[data-label="消息"]::before { margin-bottom: -2px; }
    }

    @media (max-width: 380px) {
      .grid { grid-template-columns: 1fr; }
      .metric { font-size: 28px; }
      .responsive-table td { grid-template-columns: 82px minmax(0, 1fr); }
    }
  </style>
</head>
<body>
  <header>
    <div class="hero">
      <h1>A股国家队 ETF 三因子 Sentinel</h1>
      <div class="subtitle">重点追踪多只沪深300ETF：510300、510310、510330、510360、159919；并保留 510050、512100 作为宽基对照</div>
    </div>
  </header>
  <main>
    <div class="grid">
      <section class="card">
        <div class="muted">今日/最新信号</div>
        <div id="signal" class="metric">加载中...</div>
        <p id="signal-meta"></p>
        <button id="run">立即更新数据</button>
      </section>
      <section class="card">
        <div class="muted">综合得分</div>
        <div id="score" class="metric">--</div>
      </section>
      <section class="card">
        <div class="muted">可信度</div>
        <div id="confidence" class="metric">--</div>
      </section>
      <section class="card">
        <div class="muted">触发 ETF</div>
        <div id="triggered" class="metric">--</div>
      </section>
    </div>

    <section class="card section">
      <h2>模型解释</h2>
      <p id="explanation">--</p>
      <p class="muted">说明：免费日频接口无法稳定提供 ETF 实时 IOPV，MVP 用 ETF 相对跟踪指数日涨跌近似折溢价因子；成交量放大和相对强度为另外两个因子。</p>
    </section>

    <section class="card section">
      <h2>单只 ETF 因子表</h2>
      <div class="table-wrap">
        <table class="responsive-table"><thead><tr><th>代码</th><th>名称</th><th>日期</th><th>折溢价近似</th><th>放量</th><th>相对强度</th><th>因子得分</th><th>可信度</th><th>解释</th></tr></thead><tbody id="factors"></tbody></table>
      </div>
    </section>

  </main>
<script>
const API_BASE = new URL(window.A_SHARE_ETF_API_BASE || 'api/', window.location.href);
const apiUrl = path => new URL(path, API_BASE).toString();
const fmt = n => (n === null || n === undefined || Number.isNaN(Number(n))) ? '--' : Number(n).toFixed(1);
const td = (label, value) => `<td data-label="${label}">${value ?? ''}</td>`;
async function load() {
  try {
    const res = await fetch(apiUrl('signal/latest'));
    if (!res.ok) throw new Error(`API ${res.status}: ${res.statusText}`);
    const data = await res.json();
    const s = data.signal;
    if (!s) {
      document.getElementById('signal').textContent = '暂无信号';
      return;
    }
    document.getElementById('signal').innerHTML = `<span class="badge ${s.signal}">${s.signal}</span>`;
    document.getElementById('signal-meta').textContent = `日期：${s.trade_date}`;
    document.getElementById('score').textContent = fmt(s.composite_score);
    document.getElementById('confidence').textContent = fmt(s.confidence);
    document.getElementById('triggered').textContent = (s.triggered_etfs || []).join(', ') || '无';
    document.getElementById('explanation').textContent = s.explanation || '--';
    document.getElementById('factors').innerHTML = data.factors.map(f => `<tr>${td('代码', f.code)}${td('名称', f.name)}${td('日期', f.trade_date)}${td('折溢价近似', fmt(f.premium_discount))}${td('放量', fmt(f.volume_spike))}${td('相对强度', fmt(f.relative_strength))}${td('因子得分', `<b>${fmt(f.factor_score)}</b>`)}${td('可信度', fmt(f.confidence))}${td('解释', f.explanation || '')}</tr>`).join('');
  } catch (err) {
    document.getElementById('signal').textContent = '加载失败';
    document.getElementById('signal-meta').textContent = `接口请求失败：${err.message}`;
  }
}
document.getElementById('run').onclick = async () => {
  const btn = document.getElementById('run'); btn.disabled = true; btn.textContent = '更新中...';
  try { await fetch(apiUrl('run-update'), {method:'POST'}); await load(); } finally { btn.disabled = false; btn.textContent = '立即更新数据'; }
};
load();
</script>
</body>
</html>
